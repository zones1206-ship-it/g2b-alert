<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나라장터 공고 알리미</title>
<meta name="description" content="반도체·디스플레이 장비 업계 나라장터 공고를 키워드로 필터링해 보여주는 개인용 알림 대시보드">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2v2M5 7l-1.5 4.5a1 1 0 0 0 1 1.3h5a1 1 0 0 0 1-1.3L9 7M19 7l-1.5 4.5a1 1 0 0 0 1 1.3h5a1 1 0 0 0 1-1.3L23 7" transform="translate(-5,0)"/>
          <path d="M12 4c-4 0-7 2-7 5h14c0-3-3-5-7-5Z"/>
          <path d="M4 20h16M6 20V9M18 20V9"/>
        </svg>
      </span>
      <h1>나라장터 공고 알리미</h1>
    </div>
    <button class="icon-btn" id="menuBtn" aria-label="메뉴">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
  </header>

  <nav class="filter-bar" id="filterBar" hidden>
    <button class="filter-summary" id="editKeywordsBtn">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
      <span>선택 키워드: <strong id="selectedKeywordsText"></strong></span>
    </button>
  </nav>

  <!-- Screen 1: keyword selection -->
  <main class="screen" id="screen-keywords">
    <p class="lead">관심 키워드로 맞춤 공고를 받아보세요</p>
    <h2 class="section-title">관심 키워드 선택</h2>

    <div class="keyword-grid" id="keywordGrid"></div>

    <button class="primary-btn" id="telegramBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21.9 4.3 2.7 11.6c-1 .4-1 1.7.1 2l4.7 1.5 1.8 5.6c.3.9 1.4 1.1 2.1.4l2.6-2.6 4.9 3.6c.8.6 2 .2 2.2-.8l3-16.9c.2-1.1-.9-2-2.2-1.6ZM8.9 14.5l9.4-7.6c.3-.2.6.1.3.4l-7.8 7.5c-.3.3-.5.7-.5 1.1l-.2 2.6-1.2-3.6c-.1-.4 0-.1 0-.4Z"/></svg>
      텔레그램으로 알림 받기
    </button>
    <p class="hint">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.5" fill="currentColor"/></svg>
      선택한 키워드 기준으로 신규 공고를 알려드립니다
    </p>
    <button class="ghost-btn" id="viewResultsBtn">선택한 키워드로 공고 보기 →</button>

    <p class="updated" id="updatedAt">마지막 업데이트 불러오는 중...</p>
  </main>

  <!-- Screen 2: results -->
  <main class="screen" id="screen-results" hidden>
    <div class="results-head">
      <h2 class="section-title">공고 리스트</h2>
      <span class="total-count" id="totalCount"></span>
    </div>
    <div id="resultGroups" class="result-groups"></div>
    <p class="empty-state" id="emptyState" hidden>선택한 키워드에 해당하는 공고가 없습니다.</p>
    <button class="ghost-btn" id="backBtn">← 키워드 다시 선택</button>
    <p class="updated" id="updatedAt2"></p>
  </main>

</div>

<div class="menu-panel" id="menuPanel" hidden>
  <div class="menu-panel-inner">
    <div class="menu-panel-head">
      <h3>ℹ️ 안내</h3>
      <button class="icon-btn close-btn" id="closeMenuBtn" aria-label="닫기">✕</button>
    </div>
    <ul>
      <li>이 대시보드는 나라장터(공공데이터포털) 입찰공고정보를 매일 1회 수집합니다.</li>
      <li>선택한 키워드는 이 브라우저에 저장되며, 서버로 전송되지 않습니다.</li>
      <li>텔레그램 알림 연동은 준비 중입니다.</li>
    </ul>
    <a href="https://github.com/" target="_blank" rel="noopener" id="repoLink">GitHub 저장소</a>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
