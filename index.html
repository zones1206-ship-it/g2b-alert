<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장비 프로젝트 레이더</title>
<meta name="description" content="반도체·디스플레이·도금/TGV 장비 입찰 및 프로젝트 정보를 모아 보여주는 개인용 알림 대시보드">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2v2M5 7l-1.5 4.5a1 1 0 0 0 1 1.3h5a1 1 0 0 0 1-1.3L9 7M19 7l-1.5 4.5a1 1 0 0 0 1 1.3h5a1 1 0 0 0 1-1.3L23 7" transform="translate(-5,0)"/>
          <path d="M12 4c-4 0-7 2-7 5h14c0-3-3-5-7-5Z"/>
          <path d="M4 20h16M6 20V9M18 20V9"/>
        </svg>
      </span>
      <div class="brand-text">
        <h1>장비 프로젝트 레이더</h1>
        <p class="brand-sub">반도체 · 디스플레이 · 도금/TGV 장비 입찰 및 프로젝트 정보</p>
      </div>
    </div>
    <div class="source-chips" aria-label="공고 수집 출처">
      <span class="source-chip">한국나노기술원 <b>KANC</b></span>
      <span class="source-chip">나노종합기술원 <b>NNFC</b></span>
      <span class="source-chip">KOTRA <b>해외 프로젝트</b></span>
    </div>
  </header>

  <nav class="filter-bar" id="filterBar" hidden>
    <div class="filter-row" id="categoryChipRow"></div>
    <div class="filter-row" id="typeChipRow"></div>
    <p class="filter-count" id="typeFilterCount"></p>
  </nav>

  <!-- Screen 1: category selection -->
  <main class="screen" id="screen-keywords">
    <p class="lead">관심 분야로 맞춤 프로젝트 정보를 받아보세요</p>
    <h2 class="section-title">관심 분야 선택</h2>

    <div class="keyword-grid" id="keywordGrid"></div>

    <button class="primary-btn" id="telegramBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21.9 4.3 2.7 11.6c-1 .4-1 1.7.1 2l4.7 1.5 1.8 5.6c.3.9 1.4 1.1 2.1.4l2.6-2.6 4.9 3.6c.8.6 2 .2 2.2-.8l3-16.9c.2-1.1-.9-2-2.2-1.6ZM8.9 14.5l9.4-7.6c.3-.2.6.1.3.4l-7.8 7.5c-.3.3-.5.7-.5 1.1l-.2 2.6-1.2-3.6c-.1-.4 0-.1 0-.4Z"/></svg>
      텔레그램으로 알림 받기
    </button>
    <p class="hint">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.5" fill="currentColor"/></svg>
      선택한 분야 기준으로 신규 프로젝트 정보를 알려드립니다
    </p>
    <button class="ghost-btn" id="viewResultsBtn">선택한 분야로 보기 →</button>

    <p class="updated" id="updatedAt">마지막 업데이트 불러오는 중...</p>
  </main>

  <!-- Screen 2: results -->
  <main class="screen" id="screen-results" hidden>
    <div class="results-head">
      <h2 class="section-title">프로젝트 리스트</h2>
      <span class="total-count" id="totalCount"></span>
    </div>
    <div id="resultGroups" class="result-groups"></div>
    <p class="empty-state" id="emptyState" hidden>선택한 조건에 해당하는 프로젝트가 없습니다.</p>
    <button class="ghost-btn" id="backBtn">← 분야 다시 선택</button>
    <p class="updated" id="updatedAt2"></p>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
