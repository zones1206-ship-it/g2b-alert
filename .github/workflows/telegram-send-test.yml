name: (임시) Telegram 테스트 메시지 전송

# 텔레그램 알림 연동 확인용 1회성 테스트 발송 워크플로.
# 저장된 TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID로 sendMessage를 호출해
# 고정된 테스트 메시지 1건만 보낸다. 신규 공고 자동 발송 기능은 아님
# (수동 실행 전용, 이 워크플로 하나로 실제 발송 경로만 검증).
#
# 보안 원칙:
# - 토큰/Chat ID는 Repository Secret(TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)
#   에서만 읽는다(코드에 직접 쓰지 않음).
# - 토큰, Chat ID, Telegram 응답 전체는 로그에 출력하지 않는다 — 실패
#   시엔 HTTP 상태코드/Telegram description만, 성공 시엔 성공 여부만
#   출력한다.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-test-message:
    runs-on: ubuntu-latest
    steps:
      - name: sendMessage로 테스트 메시지 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          # 러너는 기본 UTF-8이라 문제 없지만, 로컬 Windows(cp949)에서 테스트할
          # 때 이모지/em-dash 등이 UnicodeEncodeError로 죽는 걸 막기 위한 안전장치.
          for _stream in (sys.stdout, sys.stderr):
              if hasattr(_stream, "reconfigure"):
                  _stream.reconfigure(encoding="utf-8", errors="replace")

          TEST_MESSAGE = (
              "\U0001F6A8 장비 프로젝트 레이더 테스트 알림\n\n"
              "텔레그램 알림 연결이 정상적으로 완료되었습니다.\n\n"
              "✅ 반도체 장비\n"
              "✅ 디스플레이 장비\n"
              "✅ TGV 장비"
          )

          bot_token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()

          if not bot_token:
              print("TELEGRAM_BOT_TOKEN 시크릿이 비어 있습니다.")
              raise SystemExit(1)
          if not chat_id:
              print("TELEGRAM_CHAT_ID 시크릿이 비어 있습니다.")
              raise SystemExit(1)

          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          payload = json.dumps({"chat_id": chat_id, "text": TEST_MESSAGE}).encode("utf-8")
          req = urllib.request.Request(
              url,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as res:
                  data = json.load(res)
          except urllib.error.HTTPError as exc:
              try:
                  body = json.loads(exc.read().decode("utf-8", "ignore"))
                  description = body.get("description", "(설명 없음)")
              except Exception:
                  description = "(응답 본문을 읽을 수 없음)"
              print(f"[sendMessage] 실패 — HTTP {exc.code} — {description}")
              raise SystemExit(1)
          except urllib.error.URLError:
              print("[sendMessage] 실패 — 네트워크 오류(Telegram API에 접속할 수 없음)")
              raise SystemExit(1)

          if not data.get("ok"):
              print("[sendMessage] Telegram이 실패 응답을 반환했습니다.")
              raise SystemExit(1)

          print("[sendMessage] 테스트 메시지 전송 성공")
          PYEOF
